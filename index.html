<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        /* 导航 */
        nav {
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }
        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 20px;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2563eb;
        }
        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }
        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #2563eb;
        }
        /* Hero 区 */
        .hero {
            margin-top: 80px;
            padding: 6rem 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .hero p {
            font-size: 1.25rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 0.875rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        /* 内容区 */
        .section {
            padding: 4rem 0;
        }
        .section h2 {
            font-size: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h3 {
            margin-bottom: 1rem;
            color: #2563eb;
        }
        /* 页脚 */
        footer {
            background: #1f2937;
            color: white;
            text-align: center;
            padding: 2rem 0;
            margin-top: 4rem;
        }
        /* 响应式 */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }
            nav ul {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <div class="logo">MySite</div>
            <ul>
                <li><a href="#home">首页</a></li>
                <li><a href="#about">关于</a></li>
                <li><a href="#services">服务</a></li>
                <li><a href="#contact">联系</a></li>
            </ul>
        </div>
    </nav>

    <section id="home" class="hero">
        <div class="container">
            <h1>欢迎来到我的网站</h1>
            <p>在这里分享我的想法、作品和故事</p>
            <a href="#about" class="btn">了解更多</a>
        </div>
    </section>

    <section id="about" class="section">
        <div class="container">
            <h2>关于我</h2>
            <div class="grid">
                <div class="card">
                    <h3>简介</h3>
                    <p>这是你的个人介绍区域，可以写上你是谁，做什么的，有什么专长。</p>
                </div>
                <div class="card">
                    <h3>经历</h3>
                    <p>在这里列出你的工作经历、教育背景或者重要的项目经验。</p>
                </div>
                <div class="card">
                    <h3>兴趣</h3>
                    <p>分享你的兴趣爱好，让访客更了解你。</p>
                </div>
            </div>
        </div>
    </section>

    <section id="services" class="section" style="background: #f9fafb;">
        <div class="container">
            <h2>我的服务</h2>
            <div class="grid">
                <div class="card">
                    <h3>服务一</h3>
                    <p>描述你提供的第一项服务内容。</p>
                </div>
                <div class="card">
                    <h3>服务二</h3>
                    <p>描述你提供的第二项服务内容。</p>
                </div>
                <div class="card">
                    <h3>服务三</h3>
                    <p>描述你提供的第三项服务内容。</p>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 我的网站. 保留所有权利.</p>
        </div>
    </footer>
</body>
</html>
