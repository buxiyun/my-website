<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Leap Union - Your Growth Partner Global</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        /* 导航 */
        nav {
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }
        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 20px;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2563eb;
        }
        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }
        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #2563eb;
        }
        /* Hero 区 */
        .hero {
            margin-top: 80px;
            padding: 8rem 0;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            text-align: center;
        }
        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }
        .hero p {
            font-size: 1.5rem;
            margin-bottom: 2.5rem;
            opacity: 0.95;
            letter-spacing: 1px;
        }
        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 0.875rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        /* 内容区 */
        .section {
            padding: 4rem 0;
        }
        .section h2 {
            font-size: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h3 {
            margin-bottom: 1rem;
            color: #2563eb;
        }
        /* 页脚 */
        footer {
            background: #1f2937;
            color: white;
            text-align: center;
            padding: 2rem 0;
            margin-top: 4rem;
        }
        /* 响应式 */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }
            nav ul {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <div class="logo">The Leap Union</div>
        </div>
    </nav>

    <section id="home" class="hero">
        <div class="container">
            <div class="badge">The Leap Union</div>
            <h1>Your Global<br>Growth Partner</h1>
            <p>Website is currently under construction.<br>We'll be launching soon.</p>
            <div class="contact" style="margin-top: 3rem; font-size: 1.1rem;">
                Contact: <a href="mailto:marketing@theleapunion.com" style="color: white; text-decoration: underline;">marketing@theleapunion.com</a>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 The Leap Union. All rights reserved.</p>
            <p style="margin-top: 0.5rem; font-size: 0.85rem; opacity: 0.7;">The Leap Union (TLU) is a brand of 曦奕智方</p>
        </div>
    </footer>
</body>
</html>
